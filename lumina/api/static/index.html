<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lumina">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
<link rel="icon" href="/logo.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<title>Lumina</title>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --label: #3c3c43;
    --sub: #8e8e93;
    --accent: #007aff;
    --accent-dk: #0062cc;
    --danger: #ff3b30;
    --success: #34c759;
    --border: rgba(60,60,67,.12);
    --shadow: 0 2px 12px rgba(0,0,0,.08);
    --radius: 16px;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --card: #2c2c2e; --label: #ebebf5;
      --sub: #8e8e93; --border: rgba(84,84,88,.65);
    }
  }

  html, body { height: 100%; background: var(--bg); font-family: var(--font); color: var(--label); -webkit-text-size-adjust: 100%; }

  #app { display: flex; flex-direction: column; height: 100%; max-width: 560px; margin: 0 auto; }

  /* ── Header ── */
  header { padding: 56px 20px 0; }
  header h1 { font-size: 34px; font-weight: 700; letter-spacing: .4px; }
  header p  { margin-top: 4px; font-size: 15px; color: var(--sub); }

  /* ── Tab bar ── */
  .tabs { display: flex; gap: 8px; padding: 16px 20px 0; }
  .tab-btn {
    flex: 1; padding: 10px 0; border-radius: 12px; border: none; cursor: pointer;
    font-size: 15px; font-weight: 600; font-family: var(--font);
    background: var(--card); color: var(--sub); transition: all .18s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; }

  /* ── Main content ── */
  main { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

  /* ── Cards ── */
  .card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
  .card label { display: block; font-size: 13px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

  /* ── Drop zone ── */
  .drop-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 28px 20px;
    text-align: center; cursor: pointer; transition: border-color .18s, background .18s;
    position: relative;
  }
  .drop-zone.over { border-color: var(--accent); background: rgba(0,122,255,.06); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-zone .icon { font-size: 36px; margin-bottom: 8px; }
  .drop-zone .hint { font-size: 15px; color: var(--sub); }
  .drop-zone .hint span { color: var(--accent); font-weight: 600; }
  .drop-zone .filename { margin-top: 8px; font-size: 14px; font-weight: 500; color: var(--label); word-break: break-all; }

  /* ── URL input ── */
  .url-row { display: flex; gap: 8px; align-items: center; }
  .url-row input {
    flex: 1; padding: 12px 14px; border-radius: 10px; border: 1.5px solid var(--border);
    font-size: 15px; font-family: var(--font); color: var(--label); background: var(--bg);
    outline: none; transition: border-color .18s;
  }
  .url-row input:focus { border-color: var(--accent); }
  .url-row input::placeholder { color: var(--sub); }

  /* ── Options row ── */
  .options { display: flex; gap: 8px; flex-wrap: wrap; }
  .opt-btn {
    padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border);
    font-size: 14px; font-weight: 500; font-family: var(--font); cursor: pointer;
    background: var(--bg); color: var(--label); transition: all .15s;
  }
  .opt-btn.selected { border-color: var(--accent); background: rgba(0,122,255,.1); color: var(--accent); }

  /* ── Action button ── */
  .btn-primary {
    width: 100%; padding: 16px; border-radius: var(--radius); border: none; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 17px; font-weight: 600;
    font-family: var(--font); transition: background .15s, opacity .15s;
  }
  .btn-primary:active { background: var(--accent-dk); }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

  /* ── Progress ── */
  .progress-bar-track { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
  .progress-label { font-size: 13px; color: var(--sub); }

  /* ── Result area ── */
  .result-text {
    background: var(--bg); border-radius: 12px; padding: 14px;
    font-size: 15px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    max-height: 340px; overflow-y: auto;
  }
  .result-text.streaming::after { content: "▋"; animation: blink .7s step-start infinite; color: var(--accent); }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Download buttons ── */
  .dl-row { display: flex; gap: 10px; }
  .btn-dl {
    flex: 1; padding: 13px; border-radius: 12px; border: 1.5px solid var(--accent);
    background: transparent; color: var(--accent); font-size: 15px; font-weight: 600;
    font-family: var(--font); cursor: pointer; text-align: center; text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background .15s;
  }
  .btn-dl:active { background: rgba(0,122,255,.08); }

  /* ── Error ── */
  .error-msg { color: var(--danger); font-size: 14px; padding: 4px 0; }

  /* ── Digest sections ── */
  .digest-item {
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 8px;
    background: var(--card);
  }
  .digest-item-header {
    padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
    user-select: none;
  }
  .digest-item-header:hover { background: rgba(0,0,0,.03); }
  .digest-item-body {
    padding: 0 16px 14px; border-top: 1px solid var(--border); padding-top: 12px;
    font-size: 14px; line-height: 1.7;
  }
  /* Markdown 样式 */
  .digest-item-body h1, .digest-item-body h2, .digest-item-body h3, .digest-item-body h4 {
    margin: 12px 0 6px; font-weight: 700;
  }
  .digest-item-body h1 { font-size: 18px; }
  .digest-item-body h2 { font-size: 16px; }
  .digest-item-body h3 { font-size: 15px; }
  .digest-item-body h4 { font-size: 14px; }
  .digest-item-body p { margin: 0 0 8px; }
  .digest-item-body ul, .digest-item-body ol { padding-left: 20px; margin: 0 0 8px; }
  .digest-item-body li { margin-bottom: 4px; }
  .digest-item-body code {
    background: var(--bg); border-radius: 4px; padding: 1px 5px;
    font-size: 13px; font-family: "SF Mono", monospace;
  }
  .digest-item-body pre {
    background: var(--bg); border-radius: 8px; padding: 10px 12px;
    overflow-x: auto; margin: 8px 0;
  }
  .digest-item-body pre code { background: none; padding: 0; }
  .digest-item-body hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .digest-item-body strong { font-weight: 700; }
  .digest-item-body em { font-style: italic; }

  /* ── Debug panel ── */
  .debug-section { margin-bottom: 8px; }
  .debug-summary {
    cursor: pointer; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 6px; padding: 4px 0;
    list-style: none;
  }
  .debug-pre {
    margin-top: 6px; padding: 10px; background: var(--bg); border-radius: 8px;
    font-size: 12px; line-height: 1.5; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
  }

  /* ── Bottom safe area ── */
  .safe-bottom { height: env(safe-area-inset-bottom, 16px); flex-shrink: 0; }
</style>
</head>
<body>

<div id="app" x-data="luminaApp()" x-init="init()">
  <header>
    <h1>Lumina</h1>
    <p>本地 AI · 隐私优先</p>
  </header>

  <div class="tabs">
    <button class="tab-btn" :class="{ active: tab === 'digest' }" @click="tab = 'digest'; loadDigest()">📋 日报</button>
    <button class="tab-btn" :class="{ active: tab === 'translate' }" @click="tab = 'translate'">📄 翻译</button>
    <button class="tab-btn" :class="{ active: tab === 'summarize' }" @click="tab = 'summarize'">📝 总结</button>
  </div>

  <main>

    <!-- ── 日报 panel ── -->
    <template x-if="tab === 'digest'">
      <div style="display:flex;flex-direction:column;gap:14px;">

        <!-- 工具栏 -->
        <div class="card" style="padding:14px 18px;">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
            <span style="font-size:13px;color:var(--sub);" x-text="digest.timeLabel"></span>
            <div style="display:flex;gap:8px;">
              <template x-if="digest.sections.length > 1">
                <button class="opt-btn" :class="{ selected: digest.allExpanded }"
                  style="padding:5px 12px;font-size:12px;"
                  @click="digest.allExpanded = !digest.allExpanded; digest.sections.forEach((s,i) => s.open = digest.allExpanded || i === 0)"
                  x-text="digest.allExpanded ? '收起全部' : '展开全部'"></button>
              </template>
              <a class="opt-btn" style="padding:5px 12px;font-size:12px;text-decoration:none;"
                href="/v1/digest/export" download>导出</a>
              <button class="opt-btn selected" style="padding:5px 12px;font-size:13px;font-weight:600;"
                :disabled="digest.generating"
                @click="triggerGenerate()"
                x-text="digest.generating ? '生成中…' : '立即生成'"></button>
            </div>
          </div>
        </div>

        <!-- 数据来源 -->
        <div class="card" style="padding:0;overflow:hidden;">
          <div style="width:100%;padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;color:var(--sub);"
            @click="debug.open = !debug.open; debug.open && loadDebug()">
            <span>数据来源</span>
            <span style="transition:transform .2s;" :style="debug.open ? 'transform:rotate(90deg)' : ''">▶</span>
          </div>
          <div x-show="debug.open" style="padding:0 18px 16px;display:none;" x-transition>
            <template x-if="debug.loading">
              <p style="color:var(--sub);font-size:13px;">加载中…</p>
            </template>
            <template x-for="(info, key) in debug.collectors" :key="key">
              <details class="debug-section">
                <summary class="debug-summary">
                  <span :style="info.error ? 'color:var(--danger)' : info.permission_denied ? 'color:var(--warn,#f59e0b)' : info.chars > 0 ? 'color:var(--success)' : 'color:var(--sub)'">●</span>
                  <span x-text="debug.names[key] || key"></span>
                  <span style="color:var(--sub);font-size:12px;" x-text="info.error ? info.error.split('\n').pop() : info.permission_denied ? '需要授权' : info.chars > 0 ? info.lines + ' 行 / ' + info.chars + ' 字' : '空'"></span>
                </summary>
                <template x-if="info.permission_denied">
                  <div style="padding:8px 0 4px;font-size:13px;line-height:1.6;">
                    <span style="color:var(--warn,#f59e0b);">⚠ 权限不足，无法读取备忘录。</span><br>
                    请前往 <strong>系统设置 → 隐私与安全 → 完整磁盘访问</strong>，<br>
                    将 <strong>Lumina</strong> 添加到列表并开启，然后重启 Lumina 即可。
                  </div>
                </template>
                <template x-if="info.preview && !info.permission_denied">
                  <pre class="debug-pre" x-text="info.preview"></pre>
                </template>
                <template x-if="info.error && !info.preview">
                  <pre class="debug-pre" style="color:var(--danger);" x-text="info.error"></pre>
                </template>
              </details>
            </template>
          </div>
        </div>

        <!-- 生成中 spinner -->
        <template x-if="digest.generating">
          <div class="card" style="text-align:center;padding:32px;">
            <div style="font-size:28px;margin-bottom:8px;">⏳</div>
            <div style="color:var(--sub);font-size:14px;">正在生成摘要，请稍候…</div>
          </div>
        </template>

        <!-- 错误 -->
        <template x-if="digest.error">
          <div class="error-msg" x-text="digest.error"></div>
        </template>

        <!-- 条目列表 -->
        <template x-if="!digest.generating && digest.sections.length > 0">
          <div>
            <template x-for="(sec, i) in digest.sections" :key="i">
              <div class="digest-item">
                <div class="digest-item-header" @click="sec.open = !sec.open">
                  <span>
                    <span style="color:var(--sub);font-size:12px;margin-right:6px;" x-text="i + 1"></span>
                    <span x-text="sec.title"></span>
                  </span>
                  <span style="color:var(--sub);font-size:12px;transition:transform .2s;"
                    :style="sec.open ? 'transform:rotate(90deg)' : ''">&rsaquo;</span>
                </div>
                <div class="digest-item-body" x-show="sec.open" x-html="sec.html"
                  style="display:none;" x-transition></div>
              </div>
            </template>
          </div>
        </template>

        <!-- 空状态 -->
        <template x-if="!digest.generating && digest.sections.length === 0 && !digest.error">
          <div class="card">
            <p style="color:var(--sub);font-size:14px;">暂无摘要，点击「立即生成」生成。</p>
          </div>
        </template>

      </div>
    </template>

    <!-- ── 翻译 panel ── -->
    <template x-if="tab === 'translate'">
      <div style="display:flex;flex-direction:column;gap:14px;">

        <div class="card">
          <label>上传 PDF</label>
          <div class="drop-zone" :class="{ over: translate.dragging }"
            @dragover.prevent="translate.dragging = true"
            @dragleave="translate.dragging = false"
            @drop.prevent="translate.dragging = false; onDrop($event, 'translate')">
            <input type="file" accept=".pdf" @change="onFile($event, 'translate')">
            <div class="icon">📂</div>
            <div class="hint">点击选择或<span>拖入 PDF</span></div>
            <div class="filename" x-show="translate.filename" x-text="translate.filename"></div>
          </div>
        </div>

        <div class="card">
          <label>或输入 PDF 链接</label>
          <div class="url-row">
            <input type="url" x-model="translate.url" placeholder="https://example.com/paper.pdf">
          </div>
        </div>

        <div class="card">
          <label>翻译方向</label>
          <div class="options">
            <button class="opt-btn" :class="{ selected: translate.lang === 'zh' }" @click="translate.lang = 'zh'">英 → 中</button>
            <button class="opt-btn" :class="{ selected: translate.lang === 'en' }" @click="translate.lang = 'en'">中 → 英</button>
          </div>
        </div>

        <template x-if="translate.error">
          <div class="error-msg" x-text="translate.error"></div>
        </template>

        <template x-if="translate.running">
          <div class="card">
            <div class="progress-bar-track"><div class="progress-bar-fill" :style="'width:' + translate.pct + '%'"></div></div>
            <div class="progress-label" x-text="translate.label"></div>
          </div>
        </template>

        <template x-if="translate.done">
          <div class="dl-row">
            <a class="btn-dl" :href="translate.monoUrl" download>⬇ 中文版</a>
            <a class="btn-dl" :href="translate.dualUrl" download>⬇ 双语版</a>
          </div>
        </template>

        <button class="btn-primary" :disabled="translate.running" @click="runTranslate()"
          x-text="translate.running ? '翻译中…' : '开始翻译'"></button>
      </div>
    </template>

    <!-- ── 总结 panel ── -->
    <template x-if="tab === 'summarize'">
      <div style="display:flex;flex-direction:column;gap:14px;">

        <div class="card">
          <label>上传 PDF</label>
          <div class="drop-zone" :class="{ over: summarize.dragging }"
            @dragover.prevent="summarize.dragging = true"
            @dragleave="summarize.dragging = false"
            @drop.prevent="summarize.dragging = false; onDrop($event, 'summarize')">
            <input type="file" accept=".pdf" @change="onFile($event, 'summarize')">
            <div class="icon">📂</div>
            <div class="hint">点击选择或<span>拖入 PDF</span></div>
            <div class="filename" x-show="summarize.filename" x-text="summarize.filename"></div>
          </div>
        </div>

        <div class="card">
          <label>或输入 PDF 链接</label>
          <div class="url-row">
            <input type="url" x-model="summarize.url" placeholder="https://example.com/paper.pdf">
          </div>
        </div>

        <template x-if="summarize.error">
          <div class="error-msg" x-text="summarize.error"></div>
        </template>

        <template x-if="summarize.running">
          <div class="card">
            <div class="progress-bar-track"><div class="progress-bar-fill" :style="'width:' + summarize.pct + '%'"></div></div>
            <div class="progress-label" x-text="summarize.label"></div>
          </div>
        </template>

        <template x-if="summarize.text">
          <div class="card">
            <div class="result-text" :class="{ streaming: summarize.running }" x-text="summarize.text"
              style="max-height:340px;overflow-y:auto;"></div>
          </div>
        </template>

        <button class="btn-primary" :disabled="summarize.running" @click="runSummarize()"
          x-text="summarize.running ? '总结中…' : '生成总结'"></button>
      </div>
    </template>

  </main>
  <div class="safe-bottom"></div>
</div>

<script>
// 配置 marked：禁用 mangle/headerIds 避免警告
marked.use({ mangle: false, headerIds: false, breaks: true, gfm: true });

function luminaApp() {
  return {
    tab: 'digest',

    // ── Digest ──
    digest: {
      sections: [],
      timeLabel: '加载中…',
      generating: false,
      allExpanded: false,
      error: '',
      _pollTimer: null,
      _autoTimer: null,
      _serverStart: null,
    },

    // ── Translate ──
    translate: {
      file: null, filename: '', url: '', lang: 'zh',
      running: false, pct: 0, label: '', error: '',
      done: false, monoUrl: '', dualUrl: '', dragging: false,
    },

    // ── Summarize ──
    summarize: {
      file: null, filename: '', url: '',
      running: false, pct: 0, label: '', error: '', text: '', dragging: false,
    },

    // ── Debug ──
    debug: {
      open: false, loading: false,
      collectors: {},
      names: {
        collect_shell_history:   '终端历史',
        collect_git_logs:        'Git 提交',
        collect_clipboard:       '剪贴板',
        collect_browser_history: '浏览器历史',
        collect_notes_app:       '备忘录',
        collect_calendar:        '日历',
        collect_markdown_notes:  'Markdown 笔记',
        collect_ai_queries:      'AI 提问',
      },
    },

    // ── Init ──
    init() {
      this.loadDigest();
      // 每 5 分钟静默刷新（仅日报 tab 激活时）
      this.digest._autoTimer = setInterval(() => {
        if (this.tab === 'digest') this.loadDigest();
      }, 5 * 60 * 1000);
    },

    // ── Digest: load ──
    async loadDigest() {
      this._stopPoll();
      this.digest.error = '';
      try {
        const res = await fetch('/v1/digest');
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();

        // 检测服务重启：server_start 变化说明服务重启了，需重新渲染
        if (data.server_start && this.digest._serverStart !== null
            && data.server_start !== this.digest._serverStart) {
          this.digest.sections = [];
        }
        if (data.server_start) this.digest._serverStart = data.server_start;

        if (data.generating) {
          this.digest.generating = true;
          this.digest.timeLabel = '正在生成摘要…';
          this.digest._pollTimer = setTimeout(() => this.loadDigest(), 2000);
          return;
        }

        this.digest.generating = false;

        if (data.generated_at) {
          const d = new Date(data.generated_at);
          this.digest.timeLabel = '生成于 ' + d.toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
        } else {
          this.digest.timeLabel = '尚未生成';
        }

        if (data.content) {
          const rawSections = data.content.split('\n---\n').map(s => s.trim()).filter(s => s);
          this.digest.sections = rawSections.map((s, i) => {
            // 提取 "# 2026-04-08 21:24" 格式作为标题
            const m = s.match(/^#\s+(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})/m);
            const title = m ? m[1] : s.split('\n')[0].replace(/^#+\s*/, '').trim() || ('条目 ' + (i + 1));
            // 去掉 HTML 注释行再渲染 Markdown
            const cleaned = s.replace(/<!--.*?-->\n?/g, '');
            return { title, html: marked.parse(cleaned), open: i === 0 };
          });
          this.digest.allExpanded = false;
        } else {
          this.digest.sections = [];
        }
      } catch(e) {
        this.digest.error = '加载失败：' + e.message;
        this.digest.generating = false;
      }
    },

    // ── Digest: trigger generate ──
    async triggerGenerate() {
      this.digest.generating = true;
      this.digest.error = '';
      try {
        const res = await fetch('/v1/digest/refresh', { method: 'POST' });
        if (!res.ok) throw new Error(res.statusText);
        // poll 直到完成
        while (true) {
          await this._sleep(2000);
          const poll = await fetch('/v1/digest');
          if (!poll.ok) throw new Error(poll.statusText);
          const data = await poll.json();
          if (!data.generating) { await this.loadDigest(); return; }
        }
      } catch(e) {
        this.digest.error = '生成失败：' + e.message;
        this.digest.generating = false;
      }
    },

    _stopPoll() {
      if (this.digest._pollTimer) { clearTimeout(this.digest._pollTimer); this.digest._pollTimer = null; }
    },

    // ── Debug ──
    async loadDebug() {
      this.debug.loading = true;
      try {
        const res = await fetch('/v1/digest/debug');
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        this.debug.collectors = data.collectors || {};
      } catch(e) {
        // ignore
      } finally {
        this.debug.loading = false;
      }
    },

    // ── File handling ──
    onFile(e, panel) {
      const f = e.target.files[0];
      if (f) { this[panel].file = f; this[panel].filename = f.name; this[panel].url = ''; }
    },
    onDrop(e, panel) {
      const f = e.dataTransfer.files[0];
      if (f && f.name.toLowerCase().endsWith('.pdf')) { this[panel].file = f; this[panel].filename = f.name; this[panel].url = ''; }
    },

    // ── Translate ──
    async runTranslate() {
      const t = this.translate;
      t.error = ''; t.done = false;
      const url = this._normalizeUrl(t.url.trim());
      if (!t.file && !url) { t.error = '请上传 PDF 或输入链接'; return; }

      t.running = true; t.pct = 10; t.label = '正在上传…';
      try {
        let res;
        if (t.file) {
          const fd = new FormData();
          fd.append('file', t.file);
          fd.append('lang_out', t.lang);
          res = await fetch('/v1/pdf/upload', { method: 'POST', body: fd });
        } else {
          res = await fetch('/v1/pdf/url', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, action: 'translate', lang_out: t.lang }),
          });
        }
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        const { job_id } = await res.json();

        t.pct = 30; t.label = '正在翻译，可能需要几分钟…';
        while (true) {
          await this._sleep(2000);
          const poll = await fetch('/v1/pdf/job/' + job_id);
          const data = await poll.json();
          if (data.status === 'done') {
            t.monoUrl = '/v1/pdf/download/' + job_id + '/mono';
            t.dualUrl = '/v1/pdf/download/' + job_id + '/dual';
            t.done = true; t.pct = 100; t.label = '完成！';
            break;
          }
          if (data.status === 'error') throw new Error(data.error || '翻译失败');
          t.pct = Math.min(t.pct + 8, 90);
        }
      } catch(e) {
        t.error = '错误：' + e.message;
      } finally {
        t.running = false;
      }
    },

    // ── Summarize ──
    async runSummarize() {
      const s = this.summarize;
      s.error = ''; s.text = '';
      const url = this._normalizeUrl(s.url.trim());
      if (!s.file && !url) { s.error = '请上传 PDF 或输入链接'; return; }

      s.running = true; s.pct = 20; s.label = '正在提取文字…';
      try {
        let endpoint, body, headers = {};
        if (s.file) {
          const fd = new FormData();
          fd.append('file', s.file);
          fd.append('action', 'summarize');
          endpoint = '/v1/pdf/upload_stream'; body = fd;
        } else {
          endpoint = '/v1/pdf/url_stream';
          headers['Content-Type'] = 'application/json';
          body = JSON.stringify({ url, action: 'summarize' });
        }
        const res = await fetch(endpoint, { method: 'POST', headers, body });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);

        s.pct = 60; s.label = '正在生成摘要…';
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const payload = line.slice(5).trim();
            if (payload === '[DONE]') break;
            try { const d = JSON.parse(payload); if (d.text) s.text += d.text; } catch {}
          }
        }
        s.pct = 100; s.label = '完成！';
      } catch(e) {
        s.error = '错误：' + e.message;
      } finally {
        s.running = false;
      }
    },

    // ── Helpers ──
    _normalizeUrl(url) {
      return url.replace(/arxiv\.org\/abs\/([0-9]+\.[0-9]+)/g, 'arxiv.org/pdf/$1');
    },
    _sleep(ms) { return new Promise(r => setTimeout(r, ms)); },
  };
}
</script>
