<div class="grid grid-cols-4 gap-4">
  {% for src in sources %}
  <div class="aspect-square rounded-2xl flex flex-col items-center justify-center gap-1 group cursor-help transition-all relative
      {% if src.active %}
        bg-indigo-50 dark:bg-indigo-900/20 hover:bg-indigo-100
      {% else %}
        bg-zinc-50 dark:bg-zinc-800 opacity-20 filter grayscale
      {% endif %}" 
      title="{{ src.name }}{% if src.active %}：最近 24 小时采集了 {{ src.chars }} 字符{% else %}：最近 24 小时无活动{% endif %}">
    <span class="text-2xl">{{ src.icon }}</span>
    <span class="text-[8px] font-bold uppercase 
        {% if src.active %}
            text-indigo-400 
        {% else %}
            text-zinc-400
        {% endif %}">
      {{ src.name }}
    </span>
  </div>
  {% endfor %}
</div>
