<div class="space-y-5">
  <div class="flex items-start justify-between gap-4">
    <div>
      <div class="text-3xl font-black text-zinc-900 dark:text-zinc-100">{{ active_count }}/{{ total_count }}</div>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-2 leading-relaxed">
        最近 24 小时有 {{ active_count }} 个来源活跃，累计 {{ total_chars_label }}。
      </p>
    </div>
    <span class="text-[10px] text-zinc-500 bg-zinc-100 dark:bg-zinc-800/50 px-2 py-1 rounded font-bold tracking-widest uppercase">
      24H
    </span>
  </div>

  <div class="rounded-2xl border border-zinc-100 dark:border-zinc-800 bg-zinc-50/70 dark:bg-zinc-900/40 p-4">
    <div class="space-y-6">
      <div class="grid grid-cols-4 gap-3">
        {% for src in sources %}
        <div class="aspect-square rounded-2xl flex flex-col items-center justify-center gap-1 group cursor-help transition-all relative
            {% if src.active %}
              bg-indigo-50 dark:bg-indigo-900/20 hover:bg-indigo-100
            {% else %}
              bg-zinc-50 dark:bg-zinc-800 opacity-30 filter grayscale
            {% endif %}"
            title="{{ src.name }}：{{ src.detail }}">
          <span class="text-2xl">{{ src.icon }}</span>
          <span class="text-[8px] font-bold uppercase
              {% if src.active %}
                  text-indigo-400
              {% else %}
                  text-zinc-400
              {% endif %}">
            {{ src.name }}
          </span>
        </div>
        {% endfor %}
      </div>

      <div class="pt-5 border-t border-zinc-200/70 dark:border-zinc-800"
           hx-get="/fragments/digest/storage"
           hx-trigger="load, every 300s, refreshStorage from:body">
        <div class="text-zinc-500 text-xs text-center">加载存储空间信息…</div>
      </div>
    </div>
  </div>
</div>
