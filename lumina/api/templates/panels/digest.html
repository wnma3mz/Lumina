<div id="panel-digest" class="grid grid-cols-1 md:grid-cols-3 gap-8">
  
  <!-- Main Content: 今日回顾 (2x2 Space) -->
  <section class="md:col-span-2 bento-card flex flex-col gap-8 min-h-[500px]">
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-4">
        <h3 class="text-2xl font-bold">今日回顾</h3>
        
        <!-- 子 tab bar (Segmented Control) - 整合到头部 -->
        <div class="flex bg-zinc-100 dark:bg-zinc-800/50 rounded-xl p-1" id="digest-seg-ctrl">
          <button class="px-4 py-1.5 text-sm font-bold rounded-lg bg-white dark:bg-zinc-700 shadow-sm transition-all" id="seg-snapshots"
                  hx-get="/fragments/digest"
                  hx-target="#digest-content"
                  hx-swap="innerHTML"
                  hx-indicator="#digest-loading"
                  onclick="setDigestSeg('snapshots')">快照</button>
          <button class="px-4 py-1.5 text-sm font-bold rounded-lg text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all" id="seg-daily"
                  hx-get="/fragments/report/daily/latest"
                  hx-target="#digest-content"
                  hx-swap="innerHTML"
                  hx-indicator="#digest-loading"
                  onclick="setDigestSeg('daily')">日报</button>
          <button class="px-4 py-1.5 text-sm font-bold rounded-lg text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all" id="seg-weekly"
                  hx-get="/fragments/report/weekly/latest"
                  hx-target="#digest-content"
                  hx-swap="innerHTML"
                  hx-indicator="#digest-loading"
                  onclick="setDigestSeg('weekly')">周报</button>
          <button class="px-4 py-1.5 text-sm font-bold rounded-lg text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all" id="seg-monthly"
                  hx-get="/fragments/report/monthly/latest"
                  hx-target="#digest-content"
                  hx-swap="innerHTML"
                  hx-indicator="#digest-loading"
                  onclick="setDigestSeg('monthly')">月报</button>
        </div>
      </div>

      <div class="flex gap-2">
        <button class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/20 hover:bg-indigo-700 transition-all"
                hx-post="/v1/digest/refresh"
                hx-target="#digest-status"
                hx-swap="innerHTML"
                hx-indicator="#digest-loading"
                hx-on::after-request="setTimeout(function(){ htmx.trigger('#digest-content','refresh'); }, 3000)">立即生成</button>
      </div>
    </div>
    
    <span id="digest-status" class="text-xs text-zinc-500 -mt-6"></span>

    <!-- 加载指示器 -->
    <div id="digest-loading" class="htmx-indicator text-center py-4 text-zinc-500 text-sm">加载中…</div>

    <!-- 内容区：初始加载 + 每5分钟轮询 + 手动 refresh 事件 -->
    <div id="digest-content" class="flex-1 flex flex-col"
         hx-get="/fragments/digest"
         hx-trigger="load, every 300s, refresh"
         hx-swap="innerHTML">
      <div class="flex-1 flex items-center justify-center text-zinc-500">加载中…</div>
    </div>
  </section>

  <!-- Sidebar Column -->
  <div class="flex flex-col gap-8">
      
    <!-- Data Pulse Card -->
    <section class="bento-card">
      <h3 class="text-xl font-bold mb-6 flex justify-between items-center">
          数据源脉动
          <span class="text-[10px] text-zinc-500 bg-zinc-100 dark:bg-zinc-800/50 px-2 py-1 rounded font-bold tracking-widest uppercase">24H 活动</span>
      </h3>
      
      <div id="digest-sources"
           hx-get="/fragments/digest/sources"
           hx-trigger="load, every 300s, refreshSources from:body"
           hx-swap="innerHTML">
        <div class="text-zinc-500 text-sm text-center">加载中…</div>
      </div>

      <!-- Storage Placeholder -->
      <div class="mt-10 pt-8 border-t border-zinc-100 dark:border-zinc-800"
           hx-get="/fragments/digest/storage" 
           hx-trigger="load, every 300s, refreshStorage from:body">
          <div class="text-zinc-500 text-xs text-center">加载存储空间信息…</div>
      </div>
    </section>

    <!-- Document Lab Entry -->
    <section class="bento-card bg-indigo-600 dark:bg-indigo-600 text-white border-none group overflow-hidden relative cursor-pointer" onclick="document.getElementById('tab-translate').click(); updateNavStyles(document.querySelector(`label[for='tab-translate']`));">
        <div class="relative z-10 h-full flex flex-col justify-between">
            <div>
                <h3 class="text-2xl font-black italic">DOCUMENT LAB</h3>
                <p class="text-indigo-100 text-sm mt-3 leading-relaxed opacity-90 font-medium">
                    将 PDF 或 文献链接投喂给 Lumina，
                    开启沉浸式智能解读模式。
                </p>
            </div>
            <div class="mt-12 flex items-center justify-between">
                <div class="flex -space-x-3">
                    <div class="w-10 h-10 rounded-full border-2 border-indigo-600 bg-white/20 backdrop-blur flex items-center justify-center font-bold text-xs">PDF</div>
                    <div class="w-10 h-10 rounded-full border-2 border-indigo-600 bg-white/20 backdrop-blur flex items-center justify-center font-bold text-xs">URL</div>
                </div>
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-indigo-600 shadow-xl group-hover:translate-x-2 transition-transform duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </div>
            </div>
        </div>
        <!-- Decorative shapes -->
        <div class="absolute -right-12 -bottom-12 w-48 h-48 bg-white/10 rounded-full blur-3xl group-hover:bg-white/20 transition-all duration-700"></div>
    </section>

  </div>
</div>
