<div id="panel-stats" class="p-4 md:p-6 max-w-4xl mx-auto w-full">
  <div class="mb-5 flex items-center justify-between">
    <div>
      <h2 class="text-xl font-semibold text-zinc-800 dark:text-zinc-100">统计</h2>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">LLM 请求活动历史</p>
    </div>
    <div class="flex items-center gap-2">
      <div class="flex rounded-lg overflow-hidden border border-zinc-200 dark:border-zinc-700 text-xs font-medium">
        <button id="stats-toggle-24h" onclick="setStatsWindow('24h')"
          class="px-3 py-1.5 bg-indigo-500 text-white transition-colors">24 小时</button>
        <button id="stats-toggle-7d" onclick="setStatsWindow('7d')"
          class="px-3 py-1.5 bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">7 天</button>
      </div>
      <button onclick="triggerStatsRefresh()"
        class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">
        <svg id="stats-refresh-icon" class="w-3 h-3" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 8A6 6 0 1 1 8 2" stroke-linecap="round"/>
          <path d="M14 2v4h-4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="stats-refresh-label">刷新</span>
      </button>
    </div>
  </div>

  <div id="stats-body">
    <div class="text-zinc-400 dark:text-zinc-500 text-sm">加载中…</div>
  </div>

  <!-- Tooltip 浮层（全局单例） -->
  <div id="spark-tooltip" style="position:fixed;display:none;pointer-events:none;z-index:500"
    class="bg-zinc-800 dark:bg-zinc-700 text-white text-xs rounded-lg px-2.5 py-1.5 shadow-lg whitespace-nowrap"></div>
</div>

<style>
#panel-stats .sparkline-label { font-size: 9px; fill: #a1a1aa; }
.dark #panel-stats .sparkline-label { fill: #71717a; }
@keyframes stats-spin { from { transform:rotate(0deg) } to { transform:rotate(360deg) } }
@keyframes spark-draw {
  from { stroke-dashoffset: var(--spark-len, 2000); }
  to   { stroke-dashoffset: 0; }
}
</style>

<script>
(function () {
  /* ── 常量 ── */
  const ORIGIN_LABELS = {
    chat:'对话', chat_api:'对话 API', digest:'日报',
    document:'文档', game_opening:'游戏开场', game_score:'游戏评分',
    vision:'图像', audio:'音频', unknown:'未知',
  };
  const REFRESH_INTERVAL = 30;
  const LATENCY_WARN_MS  = 3000;
  const LATENCY_CRIT_MS  = 8000;
  const P95_CRIT_MS      = 10000;

  /* ── 状态 ── */
  let _data     = null;
  let _window   = '24h';
  let _countdown= REFRESH_INTERVAL;
  let _timer    = null;

  /* ── 工具 ── */
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function fmtMs(ms) {
    if (!ms) return '—';
    return ms >= 1000 ? (ms/1000).toFixed(1)+'s' : ms+'ms';
  }
  function fmtNum(n) {
    if (n == null) return '—';
    if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
    if (n >= 1e4) return (n/1e3).toFixed(1)+'k';
    return String(n);
  }

  /* 延迟颜色（avg） */
  function latencyColor(ms) {
    if (!ms) return '';
    if (ms >= LATENCY_CRIT_MS) return 'text-red-500 dark:text-red-400';
    if (ms >= LATENCY_WARN_MS) return 'text-amber-500 dark:text-amber-400';
    return '';
  }
  /* P95 颜色（阈值更高） */
  function p95Color(ms) {
    if (!ms) return 'text-zinc-400';
    if (ms >= P95_CRIT_MS)    return 'text-red-500 dark:text-red-400';
    if (ms >= LATENCY_CRIT_MS)return 'text-amber-500 dark:text-amber-400';
    return 'text-zinc-400';
  }

  /* ── Tooltip ── */
  const _tip = document.getElementById('spark-tooltip');
  function showTip(x, y, text) {
    _tip.textContent = text;  // textContent 不解析 HTML，无 XSS 风险
    _tip.style.display = 'block';
    const tw = _tip.offsetWidth;
    _tip.style.left = (x + 12 + tw > window.innerWidth ? x - tw - 8 : x + 12) + 'px';
    _tip.style.top  = (y - 28) + 'px';
  }
  function hideTip() { _tip.style.display = 'none'; }

  /* ── 趋势折线图（SVG + Tooltip + 入场动画） ── */
  function renderSparkline(series, labelKey) {
    const W = 560, H = 52;
    const PX = 4, PT = 10, PB = 4;
    const counts = series.map(d => d.count);
    const max = Math.max(...counts, 1);
    const n = counts.length;
    if (n < 2) return '';

    const pts = counts.map((v, i) => {
      const x = PX + (i / (n-1)) * (W - PX*2);
      const y = PT + (1 - v/max) * (H - PT - PB);
      return [x, y];
    });

    const linePath = pts.map((p,i) => (i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
    const baseY    = H - PB;
    const areaPath = linePath + ` L${pts[n-1][0]},${baseY} L${pts[0][0]},${baseY} Z`;

    // X 轴标注：首、中、末
    const labelIdxs = [0, Math.floor((n-1)/2), n-1];
    const labels = labelIdxs.map(i => {
      const x   = PX + (i/(n-1)) * (W - PX*2);
      const lbl = series[i][labelKey];
      return `<text x="${x}" y="${H+14}" text-anchor="middle" class="sparkline-label">${lbl}</text>`;
    });

    // 感应矩形（每列宽 = W/n，覆盖整列高度）
    const colW  = W / n;
    const rects = series.map((d, i) => {
      const cx  = PX + (i/(n-1)) * (W - PX*2);
      const lbl = d[labelKey];
      return `<rect x="${cx - colW/2}" y="0" width="${colW}" height="${H+18}"
        fill="transparent" style="cursor:default"
        data-lbl="${lbl}" data-cnt="${d.count}"
        onmouseenter="window._sparkTipShow(event,this)"
        onmouseleave="window._sparkTipHide()"/>`;
    });

    // 路径总长（近似，用于动画）
    const pathLen = pts.reduce((acc,[x,y],i) => {
      if (i===0) return 0;
      const [px,py] = pts[i-1];
      return acc + Math.hypot(x-px, y-py);
    }, 0);

    const uid = 'sp' + Math.random().toString(36).slice(2,7);

    return `<div style="overflow-x:auto;overflow-y:visible;margin:0 -4px;padding-top:4px">
      <svg id="${uid}" viewBox="0 0 ${W} ${H+18}" class="w-full" style="min-width:240px;overflow:visible">
        <defs>
          <linearGradient id="sg${uid}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#818cf8" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${areaPath}" fill="url(#sg${uid})"/>
        <path d="${linePath}" fill="none" stroke="#818cf8" stroke-width="1.5"
          stroke-linejoin="round" stroke-linecap="round"
          style="stroke-dasharray:${pathLen};stroke-dashoffset:${pathLen};
                 animation:spark-draw 0.8s ease forwards"/>
        ${pts.map(([x,y]) => `<circle cx="${x}" cy="${y}" r="2.5" fill="#818cf8"/>`).join('')}
        ${labels.join('')}
        ${rects.join('')}
      </svg>
    </div>`;
  }

  /* 感应矩形回调（挂在 window 上供内联 onmouseenter 调用） */
  window._sparkTipShow = function(e, el) {
    const lbl = el.dataset.lbl, cnt = el.dataset.cnt;
    showTip(e.clientX, e.clientY, lbl + '  ' + cnt + ' 次');
  };
  window._sparkTipHide = hideTip;

  /* ── 模型分布 ── */
  function renderModelDist(modelDist) {
    const entries = Object.entries(modelDist).sort((a,b) => b[1]-a[1]);
    if (!entries.length) return '';
    const total = entries.reduce((s,[,v]) => s+v, 0);
    const maxV  = entries[0][1];
    let html = '<div class="bento-card p-4 mb-4">';
    html += '<div class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-3">模型分布（7 天）</div>';
    html += '<div class="space-y-2">';
    for (const [model, cnt] of entries) {
      const pct   = maxV ? Math.max(Math.round(cnt/maxV*100), 2) : 2;
      const tPct  = total ? Math.round(cnt/total*100) : 0;
      const short = model.length > 32 ? model.slice(0,30)+'…' : model;
      html += `<div>
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs text-zinc-600 dark:text-zinc-300 font-medium truncate max-w-[60%]" title="${escHtml(model)}">${escHtml(short)}</span>
          <span class="text-xs text-zinc-400">${tPct}% · ${fmtNum(cnt)} 次</span>
        </div>
        <div class="h-1 bg-zinc-100 dark:bg-zinc-700 rounded-full overflow-hidden">
          <div class="h-1 bg-violet-400 dark:bg-violet-500 rounded-full" style="width:${pct}%"></div>
        </div>
      </div>`;
    }
    html += '</div></div>';
    return html;
  }

  /* ── 主渲染 ── */
  function renderStats(el, data) {
    const s         = data.summary    || {};
    const origins7d = data['7d']      || {};
    const origins24h= data['24h']     || {};
    const prevBucket= data['prev_24h']|| {};

    const total7d   = s.total_7d        || 0;
    const total24h  = s.total_24h       || 0;
    const prev24h   = s.prev_total_24h  || 0;
    const avgMs     = s.avg_ms_7d       || 0;

    const activeWindow = _window === '24h' ? origins24h : origins7d;
    const windowLabel  = _window === '24h' ? '24 小时' : '7 天';

    /* 7d 汇总 */
    let totalUserChars=0, totalRespChars=0, totalErrors=0;
    let totalPT=0, totalCT=0, tokenCount=0;
    for (const b of Object.values(origins7d)) {
      totalUserChars += b.user_chars||0;
      totalRespChars += b.resp_chars||0;
      totalErrors    += b.error||0;
      totalPT        += b.prompt_tokens||0;
      totalCT        += b.completion_tokens||0;
      tokenCount     += b.token_count||0;
    }
    const errPct      = total7d ? Math.round(totalErrors/total7d*100) : 0;
    const hasTokens   = tokenCount > 0;
    const tokenCovPct = total7d ? Math.round(tokenCount/total7d*100) : 0;

    /* 今日 vs 昨日（中性色） */
    const deltaAbs = total24h - prev24h;
    const deltaPct = prev24h ? Math.round(Math.abs(deltaAbs)/prev24h*100) : null;
    let deltaHtml = '';
    if (prev24h > 0) {
      const sign  = deltaAbs >= 0 ? '+' : '';
      const arrow = deltaAbs > 0 ? '↑' : deltaAbs < 0 ? '↓' : '→';
      const val   = deltaPct != null ? deltaPct+'%' : Math.abs(deltaAbs);
      deltaHtml = `<div class="text-[10px] text-zinc-400 dark:text-zinc-500 mt-0.5">${arrow} 较昨日 ${sign}${val}</div>`;
    }

    let html = '';

    /* 汇总卡片 */
    html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">';
    html += `<div class="bento-card p-4">
      <div class="text-2xl font-bold text-zinc-800 dark:text-zinc-100">${fmtNum(total24h)}<span class="text-sm font-normal text-zinc-400 ml-1">次</span></div>
      <div class="text-xs font-medium text-zinc-500 mt-0.5">今日请求</div>
      <div class="text-[10px] text-zinc-400 mt-0.5">过去 24 小时</div>
      ${deltaHtml}
    </div>`;
    html += `<div class="bento-card p-4">
      <div class="text-2xl font-bold text-zinc-800 dark:text-zinc-100">${fmtNum(total7d)}<span class="text-sm font-normal text-zinc-400 ml-1">次</span></div>
      <div class="text-xs font-medium text-zinc-500 mt-0.5">7 天请求</div>
      <div class="text-[10px] text-zinc-400 mt-0.5">过去 7 天</div>
    </div>`;
    html += `<div class="bento-card p-4">
      <div class="text-2xl font-bold text-zinc-800 dark:text-zinc-100 ${latencyColor(avgMs)}">${fmtMs(avgMs)}</div>
      <div class="text-xs font-medium text-zinc-500 mt-0.5">平均耗时</div>
      <div class="text-[10px] text-zinc-400 mt-0.5">7 天均值</div>
    </div>`;
    html += `<div class="bento-card p-4">
      <div class="text-2xl font-bold text-zinc-800 dark:text-zinc-100">${errPct}%</div>
      <div class="text-xs font-medium text-zinc-500 mt-0.5">错误率</div>
      <div class="text-[10px] text-zinc-400 mt-0.5">${total7d ? totalErrors+' 次错误 · 7 天' : '无记录'}</div>
    </div>`;
    html += '</div>';

    /* 趋势图：24h→hourly，7d→daily */
    const series   = _window === '24h' ? (data.hourly_series||[]) : (data.daily_series||[]);
    const labelKey = _window === '24h' ? 'hour' : 'date';
    const trendLabel = _window === '24h' ? '请求趋势（24 小时·按小时）' : '请求趋势（7 天）';
    if (series.length >= 2 && series.some(d => d.count > 0)) {
      html += '<div class="bento-card p-4 mb-4">';
      html += `<div class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-3">${trendLabel}</div>`;
      html += renderSparkline(series, labelKey);
      html += '</div>';
    }

    /* Token / 字符用量 */
    const inputLabel = hasTokens ? '输入 Token'  : '输入字符';
    const outputLabel= hasTokens ? '输出 Token'  : '输出字符';
    const inputVal   = hasTokens ? fmtNum(totalPT) : fmtNum(totalUserChars);
    const outputVal  = hasTokens ? fmtNum(totalCT) : fmtNum(totalRespChars);
    const avgPerReq  = (hasTokens && tokenCount) ? Math.round((totalPT+totalCT)/tokenCount) : null;

    html += '<div class="bento-card p-4 mb-4">';
    html += '<div class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-3">用量（7 天）</div>';
    html += '<div class="grid grid-cols-2 md:grid-cols-3 gap-4">';
    html += `<div><div class="text-lg font-bold text-zinc-800 dark:text-zinc-100">${inputVal}</div><div class="text-xs text-zinc-500">${inputLabel}</div></div>`;
    html += `<div><div class="text-lg font-bold text-zinc-800 dark:text-zinc-100">${outputVal}</div><div class="text-xs text-zinc-500">${outputLabel}</div></div>`;
    if (avgPerReq != null) {
      html += `<div><div class="text-lg font-bold text-zinc-800 dark:text-zinc-100">${fmtNum(avgPerReq)}</div><div class="text-xs text-zinc-500">均值 Token/请求</div></div>`;
    }
    html += '</div>';
    if (hasTokens && tokenCovPct < 100) {
      html += `<div class="mt-3 text-[10px] text-zinc-400 flex items-center gap-1">
        <svg class="w-3 h-3 shrink-0" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 11a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm.75-4.5h-1.5v-4h1.5v4z"/></svg>
        Token 数据覆盖 ${tokenCount} / ${total7d} 条（${tokenCovPct}%），历史记录无 token 统计
      </div>`;
    } else if (!hasTokens) {
      html += `<div class="mt-3 text-[10px] text-zinc-400">字符数（无 token 统计，发起新请求后将开始记录）</div>`;
    }
    html += '</div>';

    /* 模型分布 */
    const modelDist = data.model_dist || {};
    if (Object.keys(modelDist).length > 1) {
      html += renderModelDist(modelDist);
    }

    /* 来源分布 */
    const sorted = Object.entries(activeWindow).sort((a,b) => b[1].count - a[1].count);
    html += '<div class="bento-card p-4">';
    html += `<div class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-3">来源分布（${windowLabel}）</div>`;

    if (!sorted.length) {
      html += '<div class="text-zinc-400 dark:text-zinc-500 text-sm py-4 text-center">暂无活动记录</div>';
    } else {
      const maxCount = sorted[0][1].count;
      html += '<div class="space-y-3">';
      for (const [origin, b] of sorted) {
        const label     = escHtml(ORIGIN_LABELS[origin] || origin);
        const pct       = maxCount ? Math.max(Math.round(b.count/maxCount*100), 4) : 4;
        const avgMsOrig = b.avg_ms  || 0;
        const p95Ms     = b.p95_ms  || 0;
        const errCount  = b.error   || 0;
        const errPctO   = b.count   ? Math.round(errCount/b.count*100) : 0;

        const count24hO = _window === '7d' ? ((origins24h[origin]||{}).count||0) : null;
        const prevCount = _window === '24h' ? ((prevBucket[origin]||{}).count||0) : null;

        const latCls    = latencyColor(avgMsOrig);
        const barColor  = errPctO >= 20 ? 'bg-red-400 dark:bg-red-500' : 'bg-indigo-400 dark:bg-indigo-500';

        let timeInfo = `<span class="${latCls||'text-zinc-400'}">${fmtMs(avgMsOrig)} 均值</span>`;
        if (p95Ms && p95Ms > avgMsOrig * 1.5) {
          timeInfo += ` <span class="${p95Color(p95Ms)} text-[10px]">P95 ${fmtMs(p95Ms)}</span>`;
        }

        let compareHtml = '';
        if (count24hO !== null) {
          compareHtml = `<span class="text-indigo-500 font-medium">今日 +${count24hO}</span>`;
        } else if (prevCount !== null && prevCount > 0) {
          const diff = b.count - prevCount;
          const sign = diff >= 0 ? '+' : '';
          compareHtml = `<span class="text-zinc-400 font-medium">较昨日 ${sign}${diff}</span>`;
        }

        html += `<div>
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2 min-w-0">
              <span class="text-sm text-zinc-700 dark:text-zinc-300 font-medium">${label}</span>
              ${errCount > 0 ? `<span class="text-[10px] bg-red-100 dark:bg-red-900/30 text-red-500 px-1.5 py-0.5 rounded font-medium shrink-0">${errPctO}% 错误</span>` : ''}
            </div>
            <div class="flex items-center gap-3 text-xs shrink-0 ml-2">
              ${timeInfo}
              ${compareHtml}
              <span class="font-bold text-zinc-600 dark:text-zinc-300 w-8 text-right">${b.count}</span>
            </div>
          </div>
          <div class="h-1.5 bg-zinc-100 dark:bg-zinc-700 rounded-full overflow-hidden">
            <div class="h-1.5 ${barColor} rounded-full transition-all" style="width:${pct}%"></div>
          </div>
        </div>`;
      }
      html += '</div>';
    }
    html += '</div>';

    // 保存并还原滚动位置
    const scrollEl = document.querySelector('#panel-stats');
    const prevScroll = scrollEl ? scrollEl.scrollTop : 0;
    el.innerHTML = html;
    if (scrollEl) scrollEl.scrollTop = prevScroll;
  }

  /* ── 时间维度切换 ── */
  const _TOGGLE_ON  = ['bg-indigo-500', 'text-white'];
  const _TOGGLE_OFF = ['bg-zinc-100', 'dark:bg-zinc-800', 'text-zinc-600', 'dark:text-zinc-400',
                       'hover:bg-zinc-200', 'dark:hover:bg-zinc-700'];
  function _applyToggle(btn, active) {
    (active ? _TOGGLE_OFF : _TOGGLE_ON).forEach(c => btn.classList.remove(c));
    (active ? _TOGGLE_ON  : _TOGGLE_OFF).forEach(c => btn.classList.add(c));
  }
  window.setStatsWindow = function(w) {
    _window = w;
    const b24 = document.getElementById('stats-toggle-24h');
    const b7d = document.getElementById('stats-toggle-7d');
    if (!b24 || !b7d) return;
    _applyToggle(b24, w === '24h');
    _applyToggle(b7d, w === '7d');
    if (_data) {
      const el = document.getElementById('stats-body');
      if (el) renderStats(el, _data);
    }
  };

  /* ── 自动刷新倒计时 ── */
  function startCountdown() {
    if (_timer) clearInterval(_timer);
    _countdown = REFRESH_INTERVAL;
    _timer = setInterval(function() {
      _countdown--;
      const lbl = document.getElementById('stats-refresh-label');
      if (lbl) lbl.textContent = _countdown > 0 ? _countdown+'s' : '刷新';
      if (_countdown <= 0) { clearInterval(_timer); _timer=null; loadStats(); }
    }, 1000);
  }

  window.triggerStatsRefresh = function() {
    if (_timer) { clearInterval(_timer); _timer=null; }
    loadStats();
  };

  /* ── 数据加载 ── */
  window.loadStats = async function() {
    const el = document.getElementById('stats-body');
    if (!el) return;
    const icon = document.getElementById('stats-refresh-icon');
    const lbl  = document.getElementById('stats-refresh-label');
    if (icon) icon.style.animation = 'stats-spin 1s linear infinite';
    if (lbl)  lbl.textContent = '…';
    try {
      const res = await fetch('/v1/activity');
      if (!res.ok) throw new Error('HTTP '+res.status);
      _data = await res.json();
      renderStats(el, _data);
      startCountdown();
    } catch(e) {
      el.innerHTML = `<div class="text-red-400 text-sm">加载失败：${e.message}</div>`;
    } finally {
      if (icon) icon.style.animation = '';
      const l2 = document.getElementById('stats-refresh-label');
      if (l2 && l2.textContent === '…') l2.textContent = '刷新';
    }
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', window.loadStats);
  } else {
    window.loadStats();
  }
})();
</script>
