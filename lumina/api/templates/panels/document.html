<div id="panel-document" class="grid grid-cols-1 md:grid-cols-3 gap-8">
  <div class="bento-card flex flex-col gap-6">
    <div>
      <div class="inline-flex items-center gap-2 rounded-full bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-300 px-3 py-1 text-[11px] font-bold tracking-widest uppercase">Document Workspace</div>
      <h3 class="text-2xl font-bold mt-4">文档工作台</h3>
      <p class="text-zinc-500 text-sm mt-2 leading-relaxed" id="document-task-description">在同一个入口里完成翻译或总结，支持文本、文件、链接和目录批处理。</p>
    </div>

    <div>
      <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3">任务</label>
      <div class="grid grid-cols-2 gap-3" id="document-task-group">
        <button type="button" data-task="translate" class="document-task-btn px-4 py-3 rounded-2xl text-sm font-bold bg-indigo-500 text-white shadow-lg shadow-indigo-500/20" onclick="setDocumentTask('translate', this)">翻译</button>
        <button type="button" data-task="summarize" class="document-task-btn px-4 py-3 rounded-2xl text-sm font-bold bg-zinc-100 dark:bg-zinc-800/50 text-zinc-500" onclick="setDocumentTask('summarize', this)">总结</button>
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3">输入来源</label>
      <div class="flex gap-3 p-1 bg-zinc-100 dark:bg-zinc-800/50 rounded-xl" id="document-mode-group">
        <button type="button" id="document-mode-text" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-white dark:bg-zinc-700 shadow-sm text-zinc-900 dark:text-zinc-100" onclick="setDocumentInputMode('text')">文本</button>
        <button type="button" id="document-mode-url" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-zinc-500" onclick="setDocumentInputMode('url')">链接</button>
        <button type="button" id="document-mode-file" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-zinc-500" onclick="setDocumentInputMode('file')">文件</button>
        <button type="button" id="document-mode-directory" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-zinc-500" onclick="setDocumentInputMode('directory')">目录</button>
      </div>
    </div>

    <div id="document-input-text" class="flex flex-col gap-3">
      <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider" id="document-text-label">输入原文</label>
      <textarea id="document-text" placeholder="粘贴需要处理的正文..." class="w-full min-h-[220px] max-h-[50vh] px-4 py-4 rounded-2xl bg-zinc-100 dark:bg-zinc-800/50 border border-transparent focus:bg-white dark:focus:bg-zinc-900 focus:border-indigo-500 outline-none transition-all text-sm leading-relaxed resize-y"></textarea>
      <div class="text-xs text-zinc-400" id="document-text-hint">适合网页正文、笔记、文章片段等直接处理。</div>
    </div>

    <div id="document-input-url" class="hidden flex-col gap-3">
      <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3" id="document-url-label">输入 PDF 链接</label>
      <input type="url" id="document-url" placeholder="https://example.com/paper.pdf" class="w-full px-4 py-3 rounded-xl bg-zinc-100 dark:bg-zinc-800/50 border border-transparent focus:bg-white dark:focus:bg-zinc-900 focus:border-indigo-500 outline-none transition-all text-sm">
      <div class="text-xs text-zinc-400" id="document-url-hint">适合线上论文、白皮书和可公开访问的 PDF 文档。</div>
    </div>

    <div id="document-input-file" class="hidden flex-col gap-3">
      <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3" id="document-file-label">上传 / 粘贴文件</label>
      <div class="border-2 border-dashed border-zinc-200 dark:border-zinc-700 rounded-2xl p-8 text-center cursor-pointer transition-all hover:bg-indigo-50 dark:hover:bg-indigo-900/10 hover:border-indigo-400 group relative"
           ondragover="event.preventDefault();this.classList.add('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-900/20')"
           ondragleave="this.classList.remove('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-900/20')"
           ondrop="event.preventDefault();this.classList.remove('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-900/20');handleDropZone(event,'document-file','document-filename')">
        <input type="file" id="document-file" name="file" accept=".pdf,.txt,.md,.markdown,text/plain" class="absolute inset-0 opacity-0 cursor-pointer z-10"
               onchange="showFilename(this,'document-filename')">
        <button type="button" onclick="clearFileSelection('document-file', 'document-filename'); event.stopPropagation(); event.preventDefault();" class="hidden absolute top-4 right-4 w-8 h-8 bg-red-500 text-white rounded-full items-center justify-center shadow-md hover:bg-red-600 transition-colors z-20 font-bold" id="document-file-clear">✕</button>
        <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">📂</div>
        <div class="text-sm text-zinc-500">点击选择、粘贴或<span class="text-indigo-500 font-bold ml-1">拖入 PDF / TXT / MD</span></div>
        <div class="mt-3 text-sm font-semibold text-zinc-800 dark:text-zinc-200 break-all" id="document-filename"></div>
      </div>
      <div class="text-xs text-zinc-400">PDF 会走文档解析链路，TXT/MD 会直接按纯文本处理。</div>
    </div>

    <div id="document-input-directory" class="hidden flex-col gap-3">
      <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider" id="document-directory-label">输入本地目录</label>
      <input type="text" id="document-directory" placeholder="/Users/name/Documents/papers" class="w-full px-4 py-3 rounded-xl bg-zinc-100 dark:bg-zinc-800/50 border border-transparent focus:bg-white dark:focus:bg-zinc-900 focus:border-indigo-500 outline-none transition-all text-sm">
      <div class="text-xs text-zinc-400" id="document-directory-hint">递归扫描目录下的 PDF / TXT / MD / MARKDOWN 文件，逐一翻译或总结。</div>

      <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mt-2">输出目录（可选）</label>
      <input type="text" id="document-output-dir" placeholder="留空则自动生成同级输出目录" class="w-full px-4 py-3 rounded-xl bg-zinc-100 dark:bg-zinc-800/50 border border-transparent focus:bg-white dark:focus:bg-zinc-900 focus:border-indigo-500 outline-none transition-all text-sm">
      <div class="text-xs text-zinc-400">默认在源目录同级生成一个带任务后缀和时间戳的新目录。</div>
    </div>

    <div id="document-translate-options">
      <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3">翻译方向</label>
      <div class="flex gap-4">
        <button class="flex-1 py-3 rounded-xl border border-transparent bg-indigo-500 text-white font-bold text-sm shadow-lg shadow-indigo-500/20 transition-all" id="lang-zh" onclick="setTranslateLangUI('zh')">英 → 中</button>
        <button class="flex-1 py-3 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-transparent text-zinc-600 dark:text-zinc-400 font-bold text-sm hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all" id="lang-en" onclick="setTranslateLangUI('en')">中 → 英</button>
      </div>
      <script>
        function setTranslateLangUI(lang) {
          setTranslateLang(lang);
          const zh = document.getElementById('lang-zh');
          const en = document.getElementById('lang-en');

          if (lang === 'zh') {
            zh.className = 'flex-1 py-3 rounded-xl border border-transparent bg-indigo-500 text-white font-bold text-sm shadow-lg shadow-indigo-500/20 transition-all';
            en.className = 'flex-1 py-3 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-transparent text-zinc-600 dark:text-zinc-400 font-bold text-sm hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all';
          } else {
            en.className = 'flex-1 py-3 rounded-xl border border-transparent bg-indigo-500 text-white font-bold text-sm shadow-lg shadow-indigo-500/20 transition-all';
            zh.className = 'flex-1 py-3 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-transparent text-zinc-600 dark:text-zinc-400 font-bold text-sm hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all';
          }
        }
      </script>
    </div>

    <button class="w-full py-4 mt-auto bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 rounded-xl font-black tracking-wide hover:scale-[1.02] active:scale-[0.98] transition-transform shadow-xl" id="document-run-btn" onclick="startDocumentTask()">开始翻译</button>
  </div>

  <div class="bento-card flex flex-col gap-4 md:col-span-2">
    <div class="flex items-center justify-between gap-3">
      <h3 class="text-xl font-bold mb-2" id="document-output-title">任务结果</h3>
      <div class="text-[11px] font-bold uppercase tracking-widest text-zinc-400">即时反馈</div>
    </div>
    <div id="document-result" class="flex-1 flex flex-col prose dark:prose-invert prose-sm max-w-none">
      <div class="flex-1 flex flex-col items-center justify-center text-zinc-400 text-sm h-full w-full gap-3">
        <div class="w-14 h-14 rounded-2xl bg-zinc-100 dark:bg-zinc-800/50 flex items-center justify-center text-2xl">::</div>
        <div>选择任务并输入内容后开始处理...</div>
        <div class="text-xs text-zinc-400">单文件会即时返回，目录模式会提交后台批处理任务。</div>
      </div>
    </div>
  </div>
</div>
