<div id="translate-status"
     hx-get="/fragments/pdf/status/{{ job_id }}"
     hx-trigger="every 2s"
     hx-swap="outerHTML"
     class="w-full">
  <div class="bg-zinc-50 dark:bg-zinc-800/50 rounded-2xl p-6 w-full max-w-md mx-auto border border-zinc-100 dark:border-zinc-800">
    <div class="text-sm font-bold text-zinc-500 mb-4 flex justify-between items-center">
      <span>{{ status_text }}</span>
      <span>{{ progress }}%</span>
    </div>
    <div class="w-full bg-zinc-200 dark:bg-zinc-700 rounded-full h-2.5 overflow-hidden">
      <div class="bg-indigo-600 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: {{ progress }}%"></div>
    </div>
  </div>
</div>
