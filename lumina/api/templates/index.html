<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lumina">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="theme-color" content="#f8f9ff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0c0c0e" media="(prefers-color-scheme: dark)">
<link rel="icon" href="/logo.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<title>Lumina</title>

<link rel="stylesheet" href="/static/style.css?v={{ asset_ver }}">
<script src="/static/js/htmx.min.js?v={{ asset_ver }}"></script>
<script>
  if (window.htmx && window.htmx.config) {
    window.htmx.config.allowEval = false;
    window.htmx.config.allowScriptTags = false;
  }

  if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!('theme' in localStorage)) {
      if (e.matches) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    }
  });

  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.theme = isDark ? 'dark' : 'light';
  }

  function updateFloatingUiState() {
    const saveBar = document.getElementById('save-bar');
    const body = document.body;
    if (!saveBar || !body) return;
    const visible = window.getComputedStyle(saveBar).display !== 'none';
    body.classList.toggle('save-bar-visible', visible);
  }

  document.addEventListener('DOMContentLoaded', function() {
    const hour = new Date().getHours();
    let greeting = '你好';
    if (hour < 5) greeting = '夜深了';
    else if (hour < 9) greeting = '早安';
    else if (hour < 11) greeting = '上午好';
    else if (hour < 13) greeting = '中午好';
    else if (hour < 18) greeting = '下午好';
    else if (hour < 22) greeting = '晚上好';
    else greeting = '夜深了';

    const username = "{{ username }}";
    if (username) greeting += '，' + username;

    const greetingEl = document.getElementById('greeting');
    if (greetingEl) greetingEl.textContent = greeting;

    const storageKey = 'lumina.heroSlogan';
    const fallback = [
      '让 AI 留在本地',
      '在你的电脑上思考',
      '你的本地 AI 工作台',
      '把智能留给自己',
      '本地运行，安心使用'
    ];
    const sloganEl = document.getElementById('hero-slogan');
    let candidates = [];
    if (sloganEl) {
      try {
        candidates = JSON.parse(sloganEl.dataset.slogans || '[]');
      } catch (_) {
        candidates = [];
      }
    }
    const pool = Array.isArray(candidates) && candidates.length ? candidates : fallback;
    let slogan = '';
    try {
      slogan = sessionStorage.getItem(storageKey) || '';
      if (!pool.includes(slogan)) {
        slogan = pool[Math.floor(Math.random() * pool.length)];
        sessionStorage.setItem(storageKey, slogan);
      }
    } catch (_) {
      slogan = pool[Math.floor(Math.random() * pool.length)];
    }
    if (sloganEl) sloganEl.textContent = slogan;

    updateFloatingUiState();
    const saveBar = document.getElementById('save-bar');
    if (saveBar && window.MutationObserver) {
      new MutationObserver(updateFloatingUiState).observe(saveBar, {
        attributes: true,
        attributeFilter: ['class', 'style']
      });
    }
    document.querySelectorAll('input[name="tab"]').forEach(function(el) {
      el.addEventListener('change', updateFloatingUiState);
    });
  });
</script>
</head>
<body class="min-h-screen text-zinc-900 dark:text-zinc-100 p-5 md:px-10 md:pt-8 md:pb-12 transition-colors duration-500">

<div id="app" class="max-w-6xl mx-auto" data-home-ui='{{ home_ui | default({}) | tojson | e }}' data-image-prompts='{{ image_prompts | default({}) | tojson | e }}' data-home-tabs='{{ home_tab_defs | default([]) | tojson | e }}' data-image-task-defs='{{ image_task_defs | default([]) | tojson | e }}' data-legacy-home-tab-map='{{ legacy_home_tab_map | default({}) | tojson | e }}'>

  {% for item in home_tab_defs %}
  <input type="radio" name="tab" id="tab-{{ item.key }}" {% if loop.first %}checked{% endif %} hidden>
  {% endfor %}

  <header class="mb-6 md:mb-8 flex items-center justify-between">
    <div class="flex items-center gap-3 md:gap-4">
      <div class="w-10 h-10 md:w-12 md:h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-indigo-500/20 shrink-0">L</div>
      <div class="min-w-0">
        <h1 class="text-lg md:text-xl font-extrabold tracking-tight" id="greeting">你好</h1>
        <div class="flex items-center gap-2 mt-0.5 md:mt-1">
          <span class="text-[10px] md:text-xs font-mono font-medium text-zinc-400 dark:text-zinc-500">v0.8.1</span>
          <span class="w-1 h-1 bg-zinc-300 dark:bg-zinc-600 rounded-full block"></span>
          <p
            class="text-zinc-500 dark:text-zinc-400 text-[10px] md:text-xs truncate"
            id="hero-slogan"
            data-slogans='{{ slogan_candidates | default([]) | tojson | e }}'
          >Lumina</p>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2 md:gap-3">
      <div class="glass pl-2 pr-3 py-1.5 md:pl-3 md:pr-4 md:py-2 rounded-xl flex items-center gap-2 text-[10px] md:text-xs font-semibold">
        <div class="relative">
          <span class="w-2 h-2 bg-emerald-500 rounded-full block"></span>
          <span class="w-2 h-2 bg-emerald-500 rounded-full block absolute inset-0 animate-ping"></span>
        </div>
        Active
      </div>
      <button onclick="toggleTheme()" class="glass p-2 md:p-2.5 rounded-xl hover:bg-white/90 dark:hover:bg-zinc-800 transition-colors" aria-label="切换主题">
        <span class="dark:hidden">🌙</span>
        <span class="hidden dark:inline">☀️</span>
      </button>
    </div>
  </header>

  <nav id="home-nav" class="fixed bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 glass px-2 py-2 md:px-3 md:py-3 rounded-3xl flex gap-1 md:gap-2 shadow-2xl items-center z-50 whitespace-nowrap">
    {% for item in home_tab_defs %}
    <label data-tab="{{ item.key }}" for="tab-{{ item.key }}" class="cursor-pointer px-4 py-2 md:px-6 md:py-3 rounded-2xl text-xs md:text-sm font-bold transition-all">{{ item.label }}</label>
    {% endfor %}
  </nav>

  <main class="mb-32 transition-[opacity,transform] duration-300">
    {% include "panels/digest.html" %}
    {% include "panels/document.html" %}
    {% include "panels/lab.html" %}
    {% include "panels/settings.html" %}
  </main>

  <div id="save-bar" class="fixed bottom-24 md:bottom-28 left-1/2 -translate-x-1/2 glass px-6 py-4 rounded-3xl flex items-center justify-between shadow-2xl z-[40] min-w-[320px] max-w-[600px] transition-all hidden group hover:scale-[1.02]">
    <div class="flex flex-col">
      <div id="settings-msg" class="text-xs font-bold transition-colors">修改配置后点击保存</div>
      <div id="restart-notice" class="text-[10px] font-bold text-amber-500 mt-1 hidden items-center gap-1">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        需重启服务生效
      </div>
    </div>
    <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/20 transition-all ml-4 disabled:opacity-50" id="save-btn" onclick="saveSettings()">保存配置</button>
  </div>

  <div class="pdf-route-sheet" id="pdf-route-sheet" onclick="if(event.target===this)closePdfRouteSheet()">
    <div class="pdf-route-box">
      <div class="pdf-route-title" id="pdf-route-filename">📄 文档文件</div>
      <button class="pdf-route-btn" onclick="routePdf('translate')">📄&ensp;翻译这份文件</button>
      <button class="pdf-route-btn" onclick="routePdf('summarize')">📝&ensp;总结这份文件</button>
      <button class="pdf-route-cancel" onclick="closePdfRouteSheet()">取消</button>
    </div>
  </div>

  <div class="modal-overlay" id="compare-modal" onclick="if(event.target===this)closeCompareModal()">
    <div class="modal-sheet" id="compare-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>对比预览</h3>
        <div class="flex gap-1.5">
          <button class="modal-close" id="compare-fullscreen-btn" onclick="toggleCompareFullscreen()" title="全屏">⊡</button>
          <button class="modal-close" onclick="closeCompareModal()">✕</button>
        </div>
      </div>
      <div class="flex flex-1 overflow-hidden" id="compare-modal-content">
        <div class="flex-1 overflow-y-auto p-4 md:p-6 border-r border-zinc-200 dark:border-zinc-800 no-scrollbar relative group" id="cmp-left" onscroll="syncScroll('left')">
          <div class="sticky top-0 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-sm z-10 px-3 py-1 mb-4 inline-block rounded-lg text-[10px] font-bold tracking-widest uppercase text-zinc-500 dark:text-zinc-400 shadow-sm border border-black/5 dark:border-white/5">原文</div>
          <div id="cmp-left-content" class="text-sm leading-relaxed text-zinc-700 dark:text-zinc-300 space-y-4"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 md:p-6 no-scrollbar relative group" id="cmp-right" onscroll="syncScroll('right')">
          <div class="sticky top-0 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-sm z-10 px-3 py-1 mb-4 inline-block rounded-lg text-[10px] font-bold tracking-widest uppercase text-indigo-500 dark:text-indigo-400 shadow-sm border border-indigo-500/10 dark:border-indigo-400/20">译文</div>
          <div id="cmp-right-content" class="text-sm leading-relaxed text-zinc-800 dark:text-zinc-200 space-y-4"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="safe-bottom"></div>
</div>

<script src="/static/js/home-tabs.js?v={{ asset_ver }}"></script>
<script src="/static/js/workspace-core.js?v={{ asset_ver }}"></script>
<script src="/static/js/modal-ui.js?v={{ asset_ver }}"></script>
<script src="/static/js/settings-ui.js?v={{ asset_ver }}"></script>
<script src="/static/js/app-bootstrap.js?v={{ asset_ver }}"></script>
<script src="/static/js/pet-data.js?v={{ asset_ver }}"></script>
<script src="/static/js/buddy-core.js?v={{ asset_ver }}"></script>
</body>
</html>
